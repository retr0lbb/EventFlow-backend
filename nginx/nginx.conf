# ==========================================
# Configuração Nginx - Load Balancer
# ==========================================

upstream api_servers {
    # Estratégia: Round Robin (padrão do Nginx)
    # O Docker Compose com replicas resolve "api" para múltiplos IPs
    server api:8080;
}

server {
    listen 80;
    server_name localhost;

    # ==========================================
    # Logs
    # ==========================================
    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log;

    # ==========================================
    # Proxy reverso para a API
    # ==========================================
    location / {
        proxy_pass http://api_servers;

        # Headers para identificar o cliente original
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffers
        proxy_buffering        on;
        proxy_buffer_size      4k;
        proxy_buffers          8 4k;
    }

    # ==========================================
    # Health check endpoint do próprio Nginx
    # ==========================================
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
